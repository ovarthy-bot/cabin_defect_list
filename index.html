<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uçak Defect Takip (Firebase)</title>
    <style>
        /* --- YENİ EKLENEN EV (HOME) BUTONU STİLİ --- */
        .home-btn {
            position: fixed;
            top: 10px;
            left: 70px;
            font-size: 24px;
            cursor: pointer;
            background-color: #17a2b8;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            z-index: 1000;
            text-decoration: none;
            transition: background-color 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 30px;
            line-height: 1;
        }

        .home-btn:hover {
            background-color: #138496;
        }

        .airplane-btn.edit {
            background-color: #ffc107;
            color: black;
        }

        .airplane-btn.edit:hover {
            background-color: #e0a800;
        }

        /* --- GENEL STİLLER --- */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            display: flex;
            overflow-x: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        .sidebar {
            height: 100%;
            width: 0;
            position: fixed;
            top: 0;
            left: 0;
            background-color: #333;
            overflow-x: hidden;
            transition: 0.3s;
            padding-top: 60px;
            color: white;
            z-index: 1001;
        }

        .sidebar.open {
            width: 250px;
        }

        .sidebar .close-btn {
            position: absolute;
            top: 10px;
            right: 25px;
            font-size: 36px;
            cursor: pointer;
        }

        .sidebar-content {
            padding: 20px;
        }

        .sidebar-content label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .sidebar-content input,
        .sidebar-content select,
        .sidebar-content button {
            width: 100%;
            padding: 8px;
            margin-bottom: 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .sidebar-content button {
            background-color: #4CAF50;
            color: white;
        }

        .sidebar-content button:hover {
            background-color: #45a049;
        }

        .menu-btn {
            position: fixed;
            top: 10px;
            left: 10px;
            font-size: 24px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            z-index: 1000;
            transition: background-color 0.3s;
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            transition: margin-left 0.3s, background-color 0.3s, color 0.3s;
            text-align: center;
            overflow-x: hidden;
            word-wrap: break-word;
        }

        .container.sidebar-open {
            margin-left: 250px;
        }

        .email-info {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 12px;
            color: #555;
        }

        /* Uçak Yönetimi Stilleri */
        .airplane-management {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
            align-items: flex-end;
        }

        .airplane-management select {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }

        .airplane-btn {
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            min-width: 40px;
        }

        .airplane-btn.delete {
            background-color: #dc3545;
        }

        .input-section label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
            text-align: left;
        }

        .input-section input,
        .input-section select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
            word-wrap: break-word;
            overflow-wrap: break-word;
            min-width: 0;
        }

        .input-section button.main-save-btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin-top: 20px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }

        .input-section button.main-save-btn:hover {
            background-color: #000000;
        }

        .list-section {
            margin-top: 20px;
        }

        #defect-list {
            list-style-type: none;
            padding: 0;
        }

        /* --- li: column layout, varsayılan açık kırmızı --- */
        #defect-list li {
            margin-bottom: 15px;
            padding: 15px;
            padding-top: 38px;
            background-color: #ffe5e5;
            border: 1px solid #f5a0a0;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            position: relative;
            min-width: 0;
            overflow-wrap: break-word;
            word-wrap: break-word;
            transition: background-color 0.3s, border-color 0.3s;
        }

        /* --- Durum renkleri --- */
        #defect-list li.status-nrc-kapandi {
            background-color: #d4f5d4 !important;
            border-color: #5cb85c !important;
        }
        #defect-list li.status-nrc-yazildi {
            background-color: #cce8ff !important;
            border-color: #5aaaee !important;
        }
        #defect-list li.status-itemsiz {
            background-color: #d4f5d4 !important;
            border-color: #5cb85c !important;
        }

        /* --- Üst içerik alanı (resim + detaylar) --- */
        .defect-content {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            width: 100%;
            min-width: 0;
        }

        /* --- Alt aksiyon alanı --- */
        .defect-actions {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            width: 100%;
            flex-wrap: wrap;
            gap: 6px;
        }

        /* --- Durum butonları grubu (sağ) --- */
        .action-status {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        /* --- Durum butonu genel stil --- */
        .status-btn {
            padding: 5px 9px;
            background-color: #adb5bd;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
            font-weight: bold;
            line-height: 1.3;
            transition: background-color 0.2s, transform 0.15s;
            white-space: nowrap;
        }
        .status-btn:hover {
            filter: brightness(0.88);
        }

        /* NRC Kapatıldı — aktif: yeşil */
        .status-btn.nrc-kapandi.active {
            background-color: #28a745;
            transform: scale(1.06);
        }
        /* NRC Yazıldı — aktif: mavi */
        .status-btn.nrc-yazildi.active {
            background-color: #3399dd;
            transform: scale(1.06);
        }
        /* Itemsız yapıldı — aktif: yeşil */
        .status-btn.itemsiz.active {
            background-color: #28a745;
            transform: scale(1.06);
        }

        #defect-list img {
            width: 100px;
            height: 100px;
            margin-right: 15px;
            border-radius: 4px;
            object-fit: cover;
            cursor: pointer;
            flex-shrink: 0;
        }

        #defect-list .defect-details {
            flex-grow: 1;
            text-align: left;
            min-width: 0;
            overflow-wrap: break-word;
            word-wrap: break-word;
        }

        #defect-list .defect-details div {
            margin: 5px 0;
            font-size: 14px;
            word-wrap: break-word;
            overflow-wrap: break-word;
            line-height: 1.5;
        }

        #defect-list .defect-details .label {
            font-weight: bold;
            color: #333;
        }

        /* --- İstatistik / Filtre Chip Paneli --- */
        .stats-panel {
            display: flex;
            gap: 5px;
            margin: 6px 0 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .stat-box {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 9px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            color: #fff;
            border: 2px solid transparent;
            cursor: pointer;
            background: none;
            transition: filter 0.15s, border-color 0.15s, transform 0.12s;
            white-space: nowrap;
            line-height: 1.4;
        }
        .stat-box:hover { filter: brightness(0.88); }
        .stat-box.active-filter {
            border-color: #fff;
            box-shadow: 0 0 0 2px rgba(0,0,0,0.35);
            transform: scale(1.07);
        }
        .stat-box .stat-num {
            font-size: 13px;
            font-weight: 900;
        }
        .stat-box.stat-remaining        { background-color: #e05555; }
        .stat-box.stat-nrc-yazildi      { background-color: #3399dd; }
        .stat-box.stat-itemsiz-yapilacak{ background-color: #3399dd; }
        .stat-box.stat-itemsiz          { background-color: #28a745; }
        .stat-box.stat-nrc-kapandi      { background-color: #20963a; }

        /* Filtre kaldır butonu */
        .stat-clear {
            display: none;
            align-items: center;
            gap: 3px;
            padding: 3px 9px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            color: #fff;
            background-color: #6c757d;
            border: none;
            cursor: pointer;
            transition: background-color 0.15s;
        }
        .stat-clear.visible { display: inline-flex; }
        .stat-clear:hover   { background-color: #495057; }

        /* dark tema */
        .dark-theme .stat-box.stat-remaining        { background-color: #922; }
        .dark-theme .stat-box.stat-nrc-yazildi      { background-color: #1a6699; }
        .dark-theme .stat-box.stat-itemsiz-yapilacak{ background-color: #1a6699; }
        .dark-theme .stat-box.stat-itemsiz          { background-color: #1a6e30; }
        .dark-theme .stat-box.stat-nrc-kapandi      { background-color: #145e25; }

        /* --- Yan yana input grubu --- */
        .input-row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .input-row .input-col {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }
        .input-row .input-col label {
            margin-top: 0;
            font-size: 13px;
        }
        .input-row .input-col input {
            margin-top: 4px;
            padding: 8px;
            font-size: 14px;
        }
        .card-top-actions {
            position: absolute;
            top: 8px;
            right: 8px;
            display: flex;
            gap: 4px;
        }
        .card-top-actions button {
            padding: 3px 7px;
            font-size: 13px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            line-height: 1;
        }
        .card-top-actions .btn-edit {
            background-color: #ffc107;
            color: #000;
        }
        .card-top-actions .btn-edit:hover  { background-color: #e0a800; }
        .card-top-actions .btn-delete {
            background-color: #dc3545;
            color: #fff;
        }
        .card-top-actions .btn-delete:hover { background-color: #b02a37; }

        .export-button,
        .import-button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }

        .export-button {
            background-color: #28a745;
        }

        .import-button {
            background-color: #bbcd1a;
        }

        .image-upload-options {
            display: flex;
            gap: 10px;
            margin-top: 5px;
            justify-content: center;
        }

        .image-upload-options button {
            width: 40px;
            height: 40px;
            border-radius: 4px;
            background-color: #6c757d;
            border: none;
            color: white;
            cursor: pointer;
            position: relative;
            font-size: 20px;
        }

        .suggestion-list {
            position: absolute;
            background-color: #fff;
            border: 1px solid #ccc;
            max-height: 200px;
            overflow-y: auto;
            width: 90%;
            z-index: 1000;
            display: none;
            text-align: left;
        }

        .suggestion-list div {
            padding: 8px;
            cursor: pointer;
        }

        .suggestion-list div:hover {
            background-color: #f0f0f0;
        }

        /* Loader */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 2s linear infinite;
            display: none;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Dark Theme overrides */
        body.dark-theme {
            background-color: #1a1a1a;
            color: #fff;
        }

        .dark-theme .container {
            background-color: #2d2d2d;
            color: #fff;
        }

        .dark-theme .input-section input,
        .dark-theme .input-section select {
            background-color: #3a3a3a;
            color: #fff;
            border-color: #555;
        }

        .dark-theme #defect-list li {
            background-color: #4a1a1a;
            border-color: #7a2222;
        }

        /* Dark theme durum renkleri */
        .dark-theme #defect-list li.status-nrc-kapandi {
            background-color: #1a4d1a !important;
            border-color: #5cb85c !important;
        }
        .dark-theme #defect-list li.status-nrc-yazildi {
            background-color: #0d3352 !important;
            border-color: #5aaaee !important;
        }
        .dark-theme #defect-list li.status-itemsiz {
            background-color: #1a4d1a !important;
            border-color: #5cb85c !important;
        }

        .dark-theme #defect-list .defect-details .label {
            color: #fff !important;
            font-weight: bold;
        }

        .dark-theme .suggestion-list {
            background-color: #3a3a3a;
            border: 1px solid #555;
            color: #fff;
        }

        .dark-theme .suggestion-list div {
            color: #fff;
            padding: 8px;
            cursor: pointer;
        }

        .dark-theme .suggestion-list div:hover {
            background-color: #4a4a4a;
        }

        @media (max-width: 600px) {
            .container {
                margin-left: 0;
                padding: 10px;
            }

            .container.sidebar-open {
                margin-left: 0;
                transform: translateX(250px);
            }

            .airplane-management {
                flex-wrap: wrap;
            }

            .airplane-management select {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="menu-btn" onclick="toggleSidebar()">☰</div>
    <a href="https://ovarthy-bot.github.io/navigasyon/" class="home-btn" title="Cabin Defect List">🏠</a>
    <div class="sidebar" id="sidebar">
        <span class="close-btn" onclick="toggleSidebar()">×</span>
        <div class="sidebar-content">
            <label for="image-scale">Resim Kalitesi (0.1 - 1):</label>
            <input type="number" id="image-scale" step="0.1" min="0.1" max="1" value="0.5">
            <label for="theme-select">Tema:</label>
            <select id="theme-select" onchange="changeTheme()">
                <option value="light" selected>Açık Tema</option>
                <option value="dark">Karanlık Tema</option>
            </select>
            <button onclick="alert('Bu özellik şu an bakımda.')">Koltuk No Sırala</button>
            <div style="margin-top: 20px; font-size: 12px; color: #aaa;">Firebase Connected</div>
        </div>
    </div>

    <div class="email-info"><a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="ec839a8d9eac988495c28f8381">[email&#160;protected]</a></div>

    <div class="container" id="main-container">
        <div class="input-section">
            <label for="airplane-select">UÇAK SEÇİMİ (FİLTRE):</label>
            <div class="airplane-management">
                <select id="airplane-select" onchange="filterByAirplane()">
                    <option value="" disabled selected>Uçak Seçiniz veya Ekleyiniz</option>
                </select>
                <button class="airplane-btn" onclick="addNewAirplane()" title="Yeni Uçak Ekle">+</button>
                <button class="airplane-btn edit" onclick="editSelectedAirplane()" title="Seçili Uçağı Düzenle">✏️</button>
                <button class="airplane-btn delete" onclick="deleteSelectedAirplane()" title="Seçili Uçağı Sil">-</button>
            </div>

            <label for="defect">DEFECT:</label>
            <!-- İstatistik / Filtre Paneli -->
            <div class="stats-panel" id="stats-panel">
                <button class="stat-box stat-remaining"   onclick="filterByStatus('remaining')"   title="Bekleyen defectleri filtrele"><span class="stat-num" id="stat-remaining">—</span> Bekleyen</button>
                <button class="stat-box stat-nrc-yazildi"       onclick="filterByStatus('nrc_yazildi')"       title="NRC Yazıldı filtrele"><span class="stat-num" id="stat-nrc-yazildi">—</span> NRC Yazıldı</button>
                <button class="stat-box stat-itemsiz-yapilacak" onclick="filterByStatus('itemsiz_yapilacak')" title="Itemsiz yapılacak filtrele"><span class="stat-num" id="stat-itemsiz-yapilacak">—</span> Itemsiz yapılacak</button>
                <button class="stat-box stat-itemsiz"     onclick="filterByStatus('itemsiz')"     title="Itemsız yapıldı filtrele"><span class="stat-num" id="stat-itemsiz">—</span> Itemsız yapıldı</button>
                <button class="stat-box stat-nrc-kapandi" onclick="filterByStatus('nrc_kapandi')" title="NRC Kapatıldı filtrele"><span class="stat-num" id="stat-nrc-kapandi">—</span> NRC Kapatıldı</button>
                <button class="stat-clear" id="stat-clear-btn" onclick="clearStatusFilter()">✕ Filtreyi Kaldır</button>
            </div>
            <input type="text" id="defect" placeholder="Defect giriniz" autocomplete="off"
                oninput="this.value = this.value.toUpperCase(); showSuggestions(this.value)">
            <div id="suggestion-list" class="suggestion-list"></div>

            <div class="input-row">
                <div class="input-col">
                    <label for="location">LOCATION:</label>
                    <input type="text" id="location" placeholder="Location" oninput="handleUpperCase(this)">
                </div>
                <div class="input-col">
                    <label for="partNumber">P/N:</label>
                    <input type="text" id="partNumber" placeholder="Part Number" oninput="handleUpperCase(this)">
                </div>
            </div>

            <div class="input-row">
                <div class="input-col">
                    <label for="manHours">M/H:</label>
                    <input type="text" id="manHours" placeholder="Man Hours" oninput="handleUpperCase(this)">
                </div>
                <div class="input-col">
                    <label for="quantity">QUANTITY:</label>
                    <input type="text" id="quantity" placeholder="Quantity" oninput="handleUpperCase(this)">
                </div>
            </div>

            <label for="note">NOTE:</label>
            <input type="text" id="note" placeholder="Note giriniz" oninput="handleUpperCase(this)">

            <label>Resim Yükle:</label>
            <div class="image-upload-options">
                <button onclick="document.getElementById('camera-upload').click()">📷</button>
                <button onclick="document.getElementById('gallery-upload').click()">🖼️</button>
            </div>
            <input type="file" id="camera-upload" accept="image/*" capture="environment" style="display: none;"
                onchange="handleImageUpload(event)">
            <input type="file" id="gallery-upload" accept="image/*" style="display: none;"
                onchange="handleImageUpload(event)">

            <div id="image-preview-container" style="display:none; margin-top:10px;">
                <img id="preview-img" style="width: 100px; height: 100px; object-fit: cover; border-radius: 4px;">
                <button onclick="clearImageSelection()"
                    style="background:red; color:white; border:none; border-radius:50%; width:20px; height:20px; cursor:pointer;">x</button>
            </div>

            <button onclick="saveDefectToFirebase()" class="main-save-btn">
                <span id="save-text">Kaydet</span>
                <div id="save-loader" class="loader"></div>
            </button>

            <label for="search">Arama (Mevcut Liste İçinde):</label>
            <input type="text" id="search" placeholder="Arama yapın" oninput="searchLocalList()">
        </div>

        <div class="list-section">
            <h2 id="list-header">Kaydedilen Defectler</h2>
            <ul id="defect-list"></ul>
        </div>

        <button class="export-button" onclick="exportToExcel()">Listeyi Excele Aktar</button>
        <button class="import-button" onclick="document.getElementById('excel-import').click()">Excel'den Import Et</button>
        <input type="file" id="excel-import" accept=".xlsx, .xls" style="display:none" onchange="importFromExcel(event)">
    </div>

    </script>

    <script>
        // --- DEĞİŞKENLER ---
        let selectedImageBase64 = null;
        let currentEditingId = null;
        let unsubscribeDefects = null;
        let currentDefectsData = [];

        const suggestions = [
            "LAVATORY DOORS INNER MIRRORS ARE DAMAGED",
            "LAVATORY WASTE DOOR HINGE SCREWS ARE MISSING",
            "LAVATORY WASTE DOORS ARE NOT ADJUSTED",
            "LAVATORY DOOR GRILLS ARE DIRTY",
            "LAVATORY INNER DOOR LATCHES ARE NOT WORKING PROPERLY",
            "LAVATORY FLOOR PANS ARE DAMAGED",
            "LAVATORY CABINET SERVICE PANEL HINGES ARE DAMAGED",
            "LAVATORY CEILING LENSES ARE DISLOCATED",
            "LAVATORY PAPER HOLDER ROLLERS ARE DAMAGED",
            "LAVATORY INNER AISLE SIDE WALL LOWER SURFACES ARE CORRODED",
            "LAVATORY DOORS ARE NOT ADJUSTED",
            "LAVATORY PLACARDS ARE MISSING"
        ];

        // --- Durum sabitleri ---
        const STATUS = {
            NRC_KAPANDI:       'nrc_kapandi',
            NRC_YAZILDI:       'nrc_yazildi',
            ITEMSIZ:           'itemsiz',
            ITEMSIZ_YAPILACAK: 'itemsiz_yapilacak'
        };

        function statusClass(status) {
            if (status === STATUS.NRC_KAPANDI)       return 'status-nrc-kapandi';
            if (status === STATUS.NRC_YAZILDI)       return 'status-nrc-yazildi';
            if (status === STATUS.ITEMSIZ)           return 'status-itemsiz';
            if (status === STATUS.ITEMSIZ_YAPILACAK) return 'status-nrc-yazildi';
            return '';
        }

        // --- Firebase entegreli durum güncelleme ---
        async function setDefectStatus(id, clickedStatus) {
            const li = document.querySelector(`[data-defect-id="${id}"]`);
            if (!li || !window.db) return;

            const data = currentDefectsData.find(d => d.id === id);
            const currentStatus = data ? (data.status || '') : '';

            // Aynı butona tekrar basılırsa sıfırla (kırmızıya dön)
            const newStatus = (currentStatus === clickedStatus) ? '' : clickedStatus;

            // --- Optimistic UI ---
            applyStatusToLi(li, newStatus);
            if (data) data.status = newStatus;
            renderFilteredList();
            updateStats();

            // --- Firebase'e yaz ---
            try {
                await window.updateDoc(window.doc(window.db, "defects", id), {
                    status: newStatus
                });
            } catch (error) {
                console.error("Durum güncellenirken hata:", error);
                // Geri al
                const rollback = currentStatus;
                applyStatusToLi(li, rollback);
                if (data) data.status = rollback;
                renderFilteredList();
                updateStats();
                alert("Durum kaydedilemedi: " + error.message);
            }
        }

        // li elementine durum sınıfı ve buton aktifliği uygular
        function applyStatusToLi(li, status) {
            li.classList.remove('status-nrc-kapandi', 'status-nrc-yazildi', 'status-itemsiz');
            const cls = statusClass(status);
            if (cls) li.classList.add(cls);

            // Buton aktifliklerini güncelle
            li.querySelectorAll('.status-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.status === status);
            });
        }

        async function importFromExcel(event) {
            const file = event.target.files[0];
            if (!file) return;

            const airplane = document.getElementById('airplane-select').value;
            if (!airplane) {
                alert("Lütfen önce bir uçak seçin.");
                event.target.value = '';
                return;
            }

            const reader = new FileReader();
            reader.onload = async function (e) {
                const data = new Uint8Array(e.target.result);
                const workbook = new ExcelJS.Workbook();
                await workbook.xlsx.load(data);
                const worksheet = workbook.worksheets[0];

                const defects = [];
                let hasError = false;
                let errorMessage = "";

                for (let rowIndex = 1; rowIndex <= worksheet.rowCount; rowIndex++) {
                    const row = worksheet.getRow(rowIndex);

                    if (rowIndex === 1) {
                        const firstCellValue = row.getCell(1).value;
                        if (firstCellValue && typeof firstCellValue === 'string' &&
                            (firstCellValue.toUpperCase().includes('DEFECT') || firstCellValue.toLowerCase().includes('defect'))) {
                            continue;
                        }
                    }

                    const defectCell = row.getCell(1)?.value;
                    const locationCell = row.getCell(2)?.value;
                    const noteCell = row.getCell(3)?.value;
                    const partNumberCell = row.getCell(4)?.value;
                    const manHoursCell = row.getCell(5)?.value;
                    const quantityCell = row.getCell(6)?.value;

                    if (!defectCell || defectCell.toString().trim() === '') {
                        errorMessage = `Satır ${rowIndex}: Defect boş olamaz.`;
                        hasError = true;
                        break;
                    }

                    const defectObj = {
                        airplane: airplane,
                        defect: defectCell.toString().trim().toUpperCase(),
                        location: locationCell ? locationCell.toString().trim().toUpperCase() : '',
                        note: noteCell ? noteCell.toString().trim().toUpperCase() : '',
                        partNumber: partNumberCell ? partNumberCell.toString().trim().toUpperCase() : '',
                        manHours: manHoursCell ? manHoursCell.toString().trim().toUpperCase() : '',
                        quantity: quantityCell ? quantityCell.toString().trim().toUpperCase() : '',
                    };

                    defects.push(defectObj);
                }

                if (hasError) {
                    alert("HATA: " + errorMessage + "\n\nImport işlemi durduruldu.");
                    event.target.value = '';
                    return;
                }

                if (defects.length === 0) {
                    alert("Excel dosyasında işlenecek veri bulunamadı.");
                    event.target.value = '';
                    return;
                }

                const confirmImport = confirm(`${defects.length} adet defect kaydı ${airplane} uçağına eklenmek üzere. Emin misiniz?`);
                if (!confirmImport) {
                    event.target.value = '';
                    return;
                }

                const results = await saveMultipleDefectsToFirebase(defects);
                alert(`Import işlemi tamamlandı.\nBaşarılı: ${results.successCount}\nBaşarısız: ${results.failureCount}`);
                event.target.value = '';
                filterByAirplane();
            };
            reader.readAsArrayBuffer(file);
        }

        async function saveMultipleDefectsToFirebase(defects) {
            const results = { successCount: 0, failureCount: 0 };
            for (const defect of defects) {
                try {
                    await window.addDoc(window.collection(window.db, "defects"), {
                        ...defect,
                        createdAt: window.serverTimestamp()
                    });
                    results.successCount++;
                } catch (error) {
                    console.error("Defect kaydedilirken hata:", error, defect);
                    results.failureCount++;
                }
            }
            return results;
        }

        // --- UÇAK YÖNETİMİ ---

        async function loadAirplanes() {
            if (!window.db) { setTimeout(loadAirplanes, 500); return; }

            const airplaneSelect = document.getElementById("airplane-select");
            airplaneSelect.innerHTML = `
                <option value="" disabled selected>Uçak Seçiniz</option>
                <option value="ALL">--- TÜM UÇAKLAR ---</option>
            `;

            try {
                const q = window.query(window.collection(window.db, "airplanes"), window.orderBy("name"));
                const querySnapshot = await window.getDocs(q);

                querySnapshot.forEach((doc) => {
                    const opt = document.createElement("option");
                    opt.value = doc.data().name;
                    opt.text = doc.data().name;
                    opt.dataset.id = doc.id;
                    airplaneSelect.appendChild(opt);
                });

                const lastPlane = localStorage.getItem("lastSelectedPlane");
                if (lastPlane) {
                    airplaneSelect.value = lastPlane;
                    filterByAirplane();
                }
            } catch (error) {
                console.error("Uçaklar yüklenirken hata:", error);
            }
        }

        async function addNewAirplane() {
            const planeName = prompt("Yeni eklenecek UÇAK ismini giriniz (Örn: TC-LGA):");
            if (!planeName) return;
            const upperName = planeName.toUpperCase().trim();

            if (!window.db) { alert("Veritabanı hazır değil"); return; }

            try {
                const q = window.query(window.collection(window.db, "airplanes"), window.where("name", "==", upperName));
                const snap = await window.getDocs(q);
                if (!snap.empty) {
                    alert("Bu uçak zaten listede var.");
                    return;
                }

                await window.addDoc(window.collection(window.db, "airplanes"), {
                    name: upperName,
                    createdAt: window.serverTimestamp()
                });

                await loadAirplanes();
                document.getElementById("airplane-select").value = upperName;
                filterByAirplane();

            } catch (e) {
                console.error("Hata:", e);
                alert("Uçak eklenemedi: " + e.message);
            }
        }

        async function deleteSelectedAirplane() {
            const select = document.getElementById("airplane-select");
            const selectedPlane = select.value;

            if (selectedPlane === "ALL") {
                alert("Genel liste görünümü silinemez. Lütfen silmek istediğiniz uçağı tekil olarak seçin.");
                return;
            }

            if (!selectedPlane) {
                alert("Silmek için bir uçak seçmelisiniz.");
                return;
            }

            const selectedOption = select.options[select.selectedIndex];
            const id = selectedOption.dataset.id;

            if (!confirm(`${selectedPlane} uçağını ve bu uçağa ait TÜM defect kayıtlarını kalıcı olarak silmek istediğinize emin misiniz?\n\nBu işlem geri alınamaz.`)) {
                return;
            }

            try {
                const defectsQuery = window.query(
                    window.collection(window.db, "defects"),
                    window.where("airplane", "==", selectedPlane)
                );

                const defectsSnapshot = await window.getDocs(defectsQuery);
                let deletedDefectsCount = 0;

                if (!defectsSnapshot.empty) {
                    const deletePromises = [];
                    defectsSnapshot.forEach((docSnap) => {
                        const data = docSnap.data();
                        const defectId = docSnap.id;
                        const imageUrl = data.imageUrl;
                        deletePromises.push(window.deleteDoc(window.doc(window.db, "defects", defectId)));
                        if (imageUrl && imageUrl.startsWith("https://firebasestorage")) {
                            try {
                                const imageRef = window.ref(window.storage, imageUrl);
                                deletePromises.push(window.deleteObject(imageRef));
                            } catch (imgErr) {
                                console.warn("Uçağa ait resim silinirken hata:", imgErr);
                            }
                        }
                    });
                    await Promise.all(deletePromises);
                    deletedDefectsCount = defectsSnapshot.size;
                }

                await window.deleteDoc(window.doc(window.db, "airplanes", id));
                alert(`${selectedPlane} uçağı ve ona ait ${deletedDefectsCount} adet defect kaydı silindi.`);
                select.value = "";
                localStorage.removeItem("lastSelectedPlane");
                loadAirplanes();
                document.getElementById("defect-list").innerHTML = "";
            } catch (e) {
                console.error("Silme hatası:", e);
                alert("Silinirken hata oluştu.");
            }
        }

        function filterByAirplane() {
            const plane = document.getElementById("airplane-select").value;
            if (!plane) return;

            // Uçak değişince durum filtresini sıfırla
            currentStatusFilter = null;
            const clearBtn = document.getElementById('stat-clear-btn');
            if (clearBtn) clearBtn.classList.remove('visible');

            localStorage.setItem("lastSelectedPlane", plane);

            let q;
            if (plane === "ALL") {
                document.getElementById("list-header").innerText = `Tüm Kayıtlı Defectler`;
                q = window.query(window.collection(window.db, "defects"));
            } else {
                document.getElementById("list-header").innerText = `${plane} İçin Kayıtlar`;
                q = window.query(
                    window.collection(window.db, "defects"),
                    window.where("airplane", "==", plane)
                );
            }

            if (unsubscribeDefects) unsubscribeDefects();

            const listEl = document.getElementById("defect-list");
            listEl.innerHTML = '<li style="text-align:center;">Yükleniyor...</li>';

            unsubscribeDefects = window.onSnapshot(q, (snapshot) => {
                const listEl = document.getElementById("defect-list");
                listEl.innerHTML = "";
                currentDefectsData = [];

                if (snapshot.empty) {
                    listEl.innerHTML = '<li style="text-align:center;">Kayıt bulunamadı.</li>';
                    return;
                }

                let tempDocs = [];
                snapshot.forEach((docSnap) => {
                    let d = docSnap.data();
                    d.id = docSnap.id;
                    tempDocs.push(d);
                });

                tempDocs.sort((a, b) => {
                    if (!a.createdAt || !b.createdAt) return 0;
                    return b.createdAt.seconds - a.createdAt.seconds;
                });

                tempDocs.forEach((data) => {
                    currentDefectsData.push(data);
                });

                renderFilteredList();
                updateStats();

            }, (error) => {
                console.error("Veri çekme hatası:", error);
                document.getElementById("defect-list").innerHTML = "Veriler alınamadı.";
            });
        }

        // --- renderDefectItem: status Firebase'den okunur ---
        function renderDefectItem(data) {
            const listEl = document.getElementById("defect-list");
            const li = document.createElement('li');

            li.dataset.defectId = data.id;

            // status alanını Firebase verisinden oku
            const status = data.status || '';
            const cls = statusClass(status);
            if (cls) li.classList.add(cls);

            let imageHtml = '';
            if (data.imageUrl) {
                imageHtml = `<img src="${data.imageUrl}" onclick="window.open('${data.imageUrl}', '_blank')">`;
            } else if (data.image) {
                imageHtml = `<img src="${data.image}" onclick="window.open('${data.image}', '_blank')">`;
            }

            li.innerHTML = `
                <div class="card-top-actions">
                    <button class="btn-edit"   onclick="prepareEdit('${data.id}')">✏️</button>
                    <button class="btn-delete" onclick="deleteDefect('${data.id}','${data.imageUrl || ''}')">🗑️</button>
                </div>
                <div class="defect-content">
                    ${imageHtml}
                    <div class="defect-details">
                        <div><span class="label">UÇAK:</span> ${data.airplane}</div>
                        <div><span class="label">DEFECT:</span> ${data.defect}</div>
                        <div><span class="label">LOCATION:</span> ${data.location}</div>
                        ${data.note       ? `<div><span class="label">NOTE:</span> ${data.note}</div>` : ''}
                        ${data.partNumber ? `<div><span class="label">P/N:</span> ${data.partNumber}</div>` : ''}
                        ${data.manHours   ? `<div><span class="label">M/H:</span> ${data.manHours}</div>` : ''}
                        ${data.quantity   ? `<div><span class="label">QTY:</span> ${data.quantity}</div>` : ''}
                    </div>
                </div>
                <div class="defect-actions">
                    <div class="action-status">
                        <button class="status-btn nrc-yazildi ${status === 'nrc_yazildi' ? 'active' : ''}"
                                data-status="nrc_yazildi"
                                onclick="setDefectStatus('${data.id}','nrc_yazildi')">NRC Yazıldı</button>
                        <button class="status-btn nrc-kapandi ${status === 'nrc_kapandi' ? 'active' : ''}"
                                data-status="nrc_kapandi"
                                onclick="setDefectStatus('${data.id}','nrc_kapandi')">NRC Kapatıldı</button>
                        <button class="status-btn itemsiz ${status === 'itemsiz' ? 'active' : ''}"
                                data-status="itemsiz"
                                onclick="setDefectStatus('${data.id}','itemsiz')">Itemsız yapıldı</button>
                        <button class="status-btn nrc-yazildi ${status === 'itemsiz_yapilacak' ? 'active' : ''}"
                                data-status="itemsiz_yapilacak"
                                onclick="setDefectStatus('${data.id}','itemsiz_yapilacak')">Itemsiz yapılacak</button>
                    </div>
                </div>
            `;
            listEl.appendChild(li);
        }

        async function editSelectedAirplane() {
            const select = document.getElementById("airplane-select");
            const selectedValue = select.value;
            const selectedOption = select.options[select.selectedIndex];
            const id = selectedOption.dataset.id;

            if (!selectedValue || selectedValue === "ALL") {
                alert("Düzenlemek için bir uçak seçmelisiniz.");
                return;
            }

            const newName = prompt(`"${selectedValue}" uçağının yeni ismini giriniz:`, selectedValue);
            if (!newName || newName.trim() === "") return;

            const upperNewName = newName.toUpperCase().trim();

            if (upperNewName === selectedValue) {
                alert("Yeni isim eski isimle aynı.");
                return;
            }

            const q = window.query(window.collection(window.db, "airplanes"),
                window.where("name", "==", upperNewName));
            const snap = await window.getDocs(q);
            if (!snap.empty) {
                alert("Bu isimde bir uçak zaten mevcut.");
                return;
            }

            if (!confirm(`"${selectedValue}" uçağının ismini "${upperNewName}" olarak değiştirmek istediğinize emin misiniz?\n\nNOT: Bu işlem, bu uçağa ait tüm defect kayıtlarında da uçak ismini güncelleyecektir.`)) {
                return;
            }

            try {
                await window.updateDoc(window.doc(window.db, "airplanes", id), { name: upperNewName });

                const defectsQuery = window.query(
                    window.collection(window.db, "defects"),
                    window.where("airplane", "==", selectedValue)
                );

                const defectsSnapshot = await window.getDocs(defectsQuery);

                if (!defectsSnapshot.empty) {
                    const updatePromises = [];
                    defectsSnapshot.forEach((docSnap) => {
                        updatePromises.push(
                            window.updateDoc(window.doc(window.db, "defects", docSnap.id), { airplane: upperNewName })
                        );
                    });
                    await Promise.all(updatePromises);
                    alert(`Uçak ismi başarıyla güncellendi.\n\n${updatePromises.length} adet defect kaydı güncellendi.`);
                } else {
                    alert("Uçak ismi başarıyla güncellendi.\n\nBu uçağa ait defect kaydı bulunmamaktadır.");
                }

                await loadAirplanes();
                setTimeout(() => {
                    document.getElementById("airplane-select").value = upperNewName;
                    filterByAirplane();
                }, 500);

            } catch (error) {
                console.error("Uçak güncellenirken hata:", error);
                alert("Güncelleme sırasında hata oluştu: " + error.message);
            }
        }

        // --- CRUD İŞLEMLERİ (FIREBASE) ---

        async function saveDefectToFirebase() {
            const airplane = document.getElementById('airplane-select').value;
            const defect = document.getElementById('defect').value;
            const location = document.getElementById('location').value;
            const note = document.getElementById('note').value;
            const partNumber = document.getElementById('partNumber').value;
            const manHours = document.getElementById('manHours').value;
            const quantity = document.getElementById('quantity').value;

            if (!airplane) { alert("Lütfen bir UÇAK seçiniz."); return; }
            if (!defect) { alert("Defect ve Location alanları zorunludur."); return; }

            const btn = document.querySelector('.main-save-btn');
            const loader = document.getElementById('save-loader');
            const btnText = document.getElementById('save-text');

            btn.disabled = true;
            btnText.style.display = 'none';
            loader.style.display = 'block';

            try {
                let imageUrl = "";

                if (selectedImageBase64) {
                    const storageRef = window.ref(window.storage, `defect_images/${Date.now()}_${Math.random().toString(36).substr(2, 9)}.jpg`);
                    await window.uploadString(storageRef, selectedImageBase64, 'data_url');
                    imageUrl = await window.getDownloadURL(storageRef);
                } else if (currentEditingId && currentDefectsData.find(d => d.id === currentEditingId)?.imageUrl) {
                    imageUrl = currentDefectsData.find(d => d.id === currentEditingId).imageUrl;
                }

                const defectObj = {
                    airplane, defect, location, note, partNumber, manHours, quantity,
                    imageUrl: imageUrl,
                    createdAt: window.serverTimestamp()
                };

                if (currentEditingId) {
                    const docRef = window.doc(window.db, "defects", currentEditingId);
                    delete defectObj.createdAt;
                    await window.updateDoc(docRef, defectObj);
                    alert("Kayıt güncellendi!");
                    currentEditingId = null;
                } else {
                    await window.addDoc(window.collection(window.db, "defects"), defectObj);
                }

                clearForm();

            } catch (error) {
                console.error("Kaydetme hatası:", error);
                alert("Hata oluştu: " + error.message);
            } finally {
                btn.disabled = false;
                btnText.style.display = 'inline';
                loader.style.display = 'none';
                btnText.innerText = "Kaydet";
            }
        }

        async function deleteDefect(id, imageUrl) {
            if (!confirm("Bu kaydı ve RESMİ kalıcı olarak silmek istediğinize emin misiniz?")) return;

            try {
                await window.deleteDoc(window.doc(window.db, "defects", id));

                if (imageUrl && imageUrl.startsWith("https://firebasestorage")) {
                    try {
                        const imageRef = window.ref(window.storage, imageUrl);
                        await window.deleteObject(imageRef);
                    } catch (imgError) {
                        console.warn("Resim silinemedi:", imgError);
                    }
                }

                alert("Kayıt ve resim başarıyla silindi.");

            } catch (error) {
                console.error("Silme hatası:", error);
                alert("Silinirken bir hata oluştu: " + error.message);
            }
        }

        function prepareEdit(id) {
            const data = currentDefectsData.find(d => d.id === id);
            if (!data) return;

            document.getElementById('airplane-select').value = data.airplane;
            document.getElementById('defect').value = data.defect;
            document.getElementById('location').value = data.location;
            document.getElementById('note').value = data.note || "";
            document.getElementById('partNumber').value = data.partNumber || "";
            document.getElementById('manHours').value = data.manHours || "";
            document.getElementById('quantity').value = data.quantity || "";

            currentEditingId = id;
            document.querySelector('.main-save-btn span').innerText = "Güncelle";

            if (data.imageUrl) {
                document.getElementById('image-preview-container').style.display = 'block';
                document.getElementById('preview-img').src = data.imageUrl;
            }

            document.querySelector('.container').scrollIntoView({ behavior: 'smooth' });
        }

        // --- YARDIMCI FONKSİYONLAR ---

        function handleUpperCase(input) {
            input.value = input.value.toUpperCase();
        }

        // --- İstatistik güncelleme ---
        function updateStats() {
            const total             = currentDefectsData.length;
            const nrcYazildi        = currentDefectsData.filter(d => d.status === 'nrc_yazildi').length;
            const itemsizYapilacak  = currentDefectsData.filter(d => d.status === 'itemsiz_yapilacak').length;
            const itemsiz           = currentDefectsData.filter(d => d.status === 'itemsiz').length;
            const nrcKapandi        = currentDefectsData.filter(d => d.status === 'nrc_kapandi').length;
            const remaining         = total - nrcYazildi - itemsizYapilacak - itemsiz - nrcKapandi;

            document.getElementById('stat-remaining').textContent          = remaining;
            document.getElementById('stat-nrc-yazildi').textContent        = nrcYazildi;
            document.getElementById('stat-itemsiz-yapilacak').textContent  = itemsizYapilacak;
            document.getElementById('stat-itemsiz').textContent            = itemsiz;
            document.getElementById('stat-nrc-kapandi').textContent        = nrcKapandi;

            document.querySelectorAll('.stat-box').forEach(btn => btn.classList.remove('active-filter'));
            if (currentStatusFilter) {
                const map = {
                    remaining:          'stat-remaining',
                    nrc_yazildi:        'stat-nrc-yazildi',
                    itemsiz_yapilacak:  'stat-itemsiz-yapilacak',
                    itemsiz:            'stat-itemsiz',
                    nrc_kapandi:        'stat-nrc-kapandi'
                };
                const el = document.querySelector(`.stat-box.${map[currentStatusFilter]}`);
                if (el) el.classList.add('active-filter');
            }
        }

        // --- Durum filtresi ---
        let currentStatusFilter = null;

        function filterByStatus(status) {
            // Aynı butona tekrar basılırsa filtre kalkar
            if (currentStatusFilter === status) {
                clearStatusFilter();
                return;
            }
            currentStatusFilter = status;
            document.getElementById('stat-clear-btn').classList.add('visible');
            renderFilteredList();
            updateStats();
        }

        function clearStatusFilter() {
            currentStatusFilter = null;
            document.getElementById('stat-clear-btn').classList.remove('visible');
            renderFilteredList();
            updateStats();
        }

        function renderFilteredList() {
            const listEl = document.getElementById('defect-list');
            listEl.innerHTML = '';
            const data = getFilteredData();
            if (data.length === 0) {
                listEl.innerHTML = '<li style="text-align:center;">Filtreye uyan kayıt bulunamadı.</li>';
                return;
            }
            data.forEach(d => renderDefectItem(d));
        }

        function getFilteredData() {
            if (!currentStatusFilter) return currentDefectsData;
            if (currentStatusFilter === 'remaining') {
                return currentDefectsData.filter(d => !d.status || d.status === '');
            }
            return currentDefectsData.filter(d => d.status === currentStatusFilter);
        }

        function clearForm() {
            document.getElementById('defect').value = '';
            document.getElementById('location').value = '';
            document.getElementById('note').value = '';
            document.getElementById('partNumber').value = '';
            document.getElementById('manHours').value = '';
            document.getElementById('quantity').value = '';
            document.getElementById('camera-upload').value = '';
            document.getElementById('gallery-upload').value = '';
            clearImageSelection();
            document.getElementById('save-text').innerText = "Kaydet";
            currentEditingId = null;
        }

        function clearImageSelection() {
            selectedImageBase64 = null;
            document.getElementById('image-preview-container').style.display = 'none';
            document.getElementById('preview-img').src = '';
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                const scale = parseFloat(document.getElementById("image-scale").value) || 0.5;
                resizeImage(e.target.result, scale).then(resizedImage => {
                    selectedImageBase64 = resizedImage;
                    document.getElementById('image-preview-container').style.display = 'block';
                    document.getElementById('preview-img').src = resizedImage;
                });
            };
            reader.readAsDataURL(file);
        }

        function resizeImage(imageSrc, scale) {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = imageSrc;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const newWidth = img.width * scale;
                    const newHeight = img.height * scale;
                    canvas.width = newWidth;
                    canvas.height = newHeight;
                    ctx.drawImage(img, 0, 0, newWidth, newHeight);
                    resolve(canvas.toDataURL('image/jpeg', 0.8));
                };
            });
        }

        function searchLocalList() {
            const term = document.getElementById('search').value.toUpperCase();
            const listEl = document.getElementById('defect-list');
            listEl.innerHTML = "";

            const base = getFilteredData();
            const filtered = term
                ? base.filter(d =>
                    (d.defect    && d.defect.includes(term))    ||
                    (d.location  && d.location.includes(term))  ||
                    (d.note      && d.note.includes(term))      ||
                    (d.quantity  && d.quantity.includes(term)))
                : base;

            if (filtered.length === 0) {
                listEl.innerHTML = '<li style="text-align:center;">Kayıt bulunamadı.</li>';
                return;
            }
            filtered.forEach(data => renderDefectItem(data));
        }

        function showSuggestions(val) {
            const list = document.getElementById("suggestion-list");
            list.innerHTML = "";
            list.style.display = "none";
            if (!val.trim()) return;

            const matches = suggestions.filter(s => s.includes(val));
            if (matches.length > 0) {
                list.style.display = "block";
                matches.forEach(s => {
                    const div = document.createElement("div");
                    div.innerText = s;
                    div.onclick = () => {
                        document.getElementById("defect").value = s;
                        list.style.display = "none";
                        document.getElementById("location").focus();
                    };
                    list.appendChild(div);
                });
            }
        }

        function hideSuggestions() {
            const list = document.getElementById("suggestion-list");
            if (!list) return;
            list.style.display = "none";
            list.innerHTML = "";
        }

        // --- EXCEL EXPORT ---
        async function exportToExcel() {
            if (currentDefectsData.length === 0) {
                alert("Listede aktarılacak veri yok.");
                return;
            }

            const exportBtn = document.querySelector('.export-button');
            const originalText = exportBtn.innerText;
            exportBtn.disabled = true;
            exportBtn.innerText = "Excel Hazırlanıyor...";

            try {
                const workbook = new ExcelJS.Workbook();
                const sheet = workbook.addWorksheet("Defects");

                sheet.columns = [
                    { header: "UÇAK",    key: "airplane",    width: 15 },
                    { header: "DEFECT",  key: "defect",      width: 40 },
                    { header: "LOCATION",key: "location",    width: 20 },
                    { header: "NOTE",    key: "note",        width: 30 },
                    { header: "P/N",     key: "partNumber",  width: 15 },
                    { header: "M/H",     key: "manHours",    width: 10 },
                    { header: "QTY",     key: "quantity",    width: 10 },
                    { header: "RESİM",   key: "image",       width: 25 },
                    { header: "DURUM",   key: "status",      width: 18 }
                ];

                sheet.getRow(1).font = { bold: true };

                for (let i = 0; i < currentDefectsData.length; i++) {
                    const d = currentDefectsData[i];
                    const rowNumber = i + 2;

                    const statusLabels = {
                        'nrc_yazildi':       'NRC Yazıldı',
                        'itemsiz_yapilacak': 'Itemsiz yapılacak',
                        'itemsiz':           'Itemsız yapıldı',
                        'nrc_kapandi':       'NRC Kapatıldı'
                    };
                    const statusLabel = statusLabels[d.status] || 'Bekleyen';

                    const row = sheet.addRow({
                        airplane:   d.airplane   || "",
                        defect:     d.defect     || "",
                        location:   d.location   || "",
                        note:       d.note       || "",
                        partNumber: d.partNumber || "",
                        manHours:   d.manHours   || "",
                        quantity:   d.quantity   || "",
                        status:     statusLabel
                    });
                    row.height = 90;

                    const imageUrl = d.imageUrl || d.image;

                    if (imageUrl) {
                        try {
                            const response = await fetch(imageUrl, { method: 'GET', mode: 'cors', cache: 'no-cache' });
                            if (!response.ok) throw new Error("Resim indirilemedi");

                            const blob = await response.blob();
                            const arrayBuffer = await blob.arrayBuffer();

                            const imageId = workbook.addImage({ buffer: arrayBuffer, extension: 'jpeg' });
                            sheet.addImage(imageId, {
                                tl: { col: 7, row: rowNumber - 1 },
                                ext: { width: 120, height: 110 },
                                editAs: 'oneCell'
                            });
                        } catch (err) {
                            console.error("Resim ekleme hatası:", err);
                            row.getCell(8).value = "Resim Yüklenemedi (CORS?)";
                        }
                    } else {
                        row.getCell(8).value = "Resim Yok";
                    }

                    // DURUM sütunu (9. sütun) addRow key ile zaten yazıldı
                }

                const buffer = await workbook.xlsx.writeBuffer();
                const blob = new Blob([buffer], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                const selectedPlane = document.getElementById('airplane-select').value || 'Tum_Ucaklar';
                a.href = url;
                a.download = `Defects_${selectedPlane}_${new Date().toISOString().slice(0, 10)}.xlsx`;
                a.click();
                URL.revokeObjectURL(url);

            } catch (error) {
                console.error("Genel hata:", error);
                alert("Hata: " + error.message);
            } finally {
                exportBtn.disabled = false;
                exportBtn.innerText = originalText;
            }
        }
